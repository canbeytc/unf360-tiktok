  // Taranıyor overlay
  function showScanning() {
    const content = document.getElementById('tu-content');
    if (!content) return;
    let ov = document.getElementById('tu-scan-overlay');
    if (!ov) {
      ov = document.createElement('div');
      ov.id = 'tu-scan-overlay';
      ov.innerHTML = '<div id="tu-pulse" style="width:72px;height:72px;border-radius:50%;background:#fe2c55;"></div><div style="font-size:22px;font-weight:800;color:#fff">Taranıyor...</div><div id="tu-last-user" style="font-size:13px;color:#fe2c55;font-weight:700;min-height:18px;"></div><div style="font-size:11px;color:#555;text-align:center">Lütfen bekleyin,<br>takip listesi yükleniyor</div>';
      content.appendChild(ov);
    }
    ov.style.display = 'flex';
    var pv = true;
    window._tuPulse = setInterval(function() {
      var p = document.getElementById('tu-pulse');
      if (p) { pv = !pv; p.style.opacity = pv ? '1' : '0.1'; p.style.transform = 'scale(' + (pv ? '1.15' : '0.8') + ')'; p.style.transition = 'all 0.35s ease'; }
    }, 400);
  }

  function hideScanning() {
    clearInterval(window._tuPulse);
    var ov = document.getElementById('tu-scan-overlay');
    if (ov) ov.style.display = 'none';
  }

  function showAction(current, total, username, countdown, isMola) {
    var old = document.getElementById('tu-toast');
    if (old) old.remove();

    var toast = document.createElement('div');
    toast.id = 'tu-toast';
    toast.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#161922;border:1px solid ' + (isMola ? '#f5a623' : '#fe2c55') + ';border-radius:14px;padding:16px 28px;z-index:2147483647;display:flex;flex-direction:column;align-items:center;gap:8px;min-width:260px;box-shadow:0 4px 24px rgba(0,0,0,0.5);';

    if (isMola) {
      toast.innerHTML =
        '<div style="font-size:11px;color:#f5a623;font-weight:700;letter-spacing:1px;">🛡️ BLOKAJ KORUMASI - MOLA</div>' +
        '<div style="font-size:36px;font-weight:900;color:#f5a623;" id="tu-countdown">' + countdown + '</div>' +
        '<div style="font-size:11px;color:#666;">saniye bekleniyor...</div>' +
        '<div style="font-size:10px;color:#444;">' + current + ' / ' + total + ' tamamlandı</div>';
    } else {
      toast.innerHTML =
        '<div style="font-size:11px;color:#555;font-weight:700;letter-spacing:1px;">TAKİPTEN ÇIKARILDI</div>' +
        '<div style="font-size:18px;font-weight:900;color:#fe2c55;">@' + username + '</div>' +
        '<div style="font-size:11px;color:#666;">' + current + ' / ' + total + ' tamamlandı</div>' +
        '<div style="font-size:22px;font-weight:900;color:#fff;" id="tu-countdown">' + countdown + '</div>' +
        '<div style="font-size:10px;color:#555;">⏳ saniye sonra devam</div>';
    }
    document.body.appendChild(toast);
  }

  function updateCountdown(val) {
    var el = document.getElementById('tu-countdown');
    if (el) el.textContent = val;
  }

  function hideAction() {
    var old = document.getElementById('tu-toast');
    if (old) old.remove();
  }

  async function waitWithCountdown(seconds, current, total, username, isMola) {
    showAction(current, total, username, seconds, isMola);
    for (var s = seconds - 1; s >= 0; s--) {
      await sleep(1000);
      updateCountdown(s);
    }
  }

  function showModal(msg) {
    var m = document.createElement('div');
    m.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:2147483647;display:flex;align-items:center;justify-content:center;';
    m.innerHTML = '<div style="background:#161922;border:1px solid #fe2c55;border-radius:16px;padding:32px 40px;text-align:center;min-width:280px;display:flex;flex-direction:column;gap:16px;">' +
      '<div style="font-size:36px;">✅</div>' +
      '<div style="font-size:16px;font-weight:800;color:#fff;">' + msg + '</div>' +
      '<button id="tu-modal-ok" style="background:#fe2c55;border:none;color:#fff;padding:10px 32px;border-radius:10px;font-weight:900;font-size:14px;cursor:pointer;">TAMAM</button>' +
      '</div>';
    document.body.appendChild(m);
    document.getElementById('tu-modal-ok').onclick = function() { m.remove(); };
  }

  async function startScan() {
    // Profil fotoğrafını yükle
    var profileLink = document.querySelector('[data-e2e="nav-profile"]');
    var avatarImg = document.querySelector('[data-e2e="user-avatar"] img');

    // Profilde değilsek git
    if (!document.querySelector('[data-e2e="following-count"]')) {
      var uname = profileLink && profileLink.href ? profileLink.href.split('@')[1].split('?')[0] : null;
      if (uname) { location.href = 'https://www.tiktok.com/@' + uname; return; }
      else { alert('Profil bulunamadı. TikTok profiline git.'); return; }
    }

    // Following popup aç
    var followBtn = document.querySelector('[data-e2e="following-count"]');
    if (followBtn) { followBtn.click(); await sleep(1500); }

    state.isScanning = true;
    render();
    setTimeout(showScanning, 50);

    // Profil foto yükle
    setTimeout(function() {
      var freshAvatar = document.querySelector('[data-e2e="user-avatar"] img') || avatarImg;
      if (freshAvatar && freshAvatar.src) state.profilePic = freshAvatar.src;
      if (profileLink) state.profileName = '@' + (profileLink.href.split('@')[1] || '').split('?')[0];
      var pp = document.getElementById('tu-pp');
      var pn = document.getElementById('tu-pn');
      if (pp && state.profilePic) pp.src = state.profilePic;
      if (pn && state.profileName) pn.textContent = state.profileName;
    }, 800);

    // Popup container bul
    var list = null;
    for (var attempt = 0; attempt < 10; attempt++) {
      list = document.querySelector('[class*="DivUserListContaine"]');
      if (list) break;
      await sleep(500);
    }

    if (!list) {
      hideScanning();
      state.isScanning = false;
      alert('Takip listesi açılamadı. Tekrar dene.');
      render(); return;
    }

    // Scroll
    var lastCount = 0, sameCount = 0;
    while (sameCount < 4) {
      list.scrollTo(0, list.scrollHeight);
      await sleep(1500);
      var count = list.querySelectorAll('a[href*="/@"]').length;
      if (count === lastCount) sameCount++;
      else sameCount = 0;
      lastCount = count;
    }

    // Kullanıcıları oku
    state.users = [];
    var seen = new Set();
    var links = Array.from(list.querySelectorAll('a[href*="/@"]')).filter(function(l) {
      return !l.href.includes('/video/') && !l.href.includes('/photo/');
    });

    for (var i = 0; i < links.length; i++) {
      var link = links[i];
      var username = link.href.split('/@')[1].split('?')[0].split('/')[0];
      if (!username || seen.has(username)) continue;
      seen.add(username);

      var container = link.closest('[class*="DivUserItem"]') || link.closest('li') || link.parentElement;
      var img = container ? container.querySelector('img') : null;
      var btn = link.parentElement ? link.parentElement.querySelector('button') : null;
      if (!btn && container) btn = container.querySelector('button');
      var btnText = btn ? (btn.innerText || btn.textContent || '').trim() : '';
      var isMutual = btnText.includes('Arkadaşlar') || btnText.includes('Friends');

      state.users.push({ username: username, avatar: img ? img.src : '', status: isMutual ? 'Arkadaşlar' : 'Takip Etmiyor', btn: btn });

      // Anlık güncelle
      var lu = document.getElementById('tu-last-user');
      if (lu) lu.textContent = '@' + username;
    }

    hideScanning();
    state.isScanning = false;
    render();
  }

  async function startAction() {
    confirmModal(state.selected.length + ' kişi için işlem başlasın mı?', async function() {
    state.isRunning = true;
    var toProcess = state.selected.slice();
    var total = toProcess.length;
    var done = 0;
    render();
    for (var i = 0; i < toProcess.length; i++) {
      var un = toProcess[i];
      var u = state.users.find(function(x) { return x.username === un; });
      if (u && u.btn) {
        u.btn.click();
        await sleep(600);
        var confirmBtn = document.querySelector('[data-e2e="unfollowModal-unfollowBtn"]');
        if (!confirmBtn) {
          var btns = document.querySelectorAll('button');
          for (var j = 0; j < btns.length; j++) {
            var txt = btns[j].textContent.trim();
            if (txt === 'Takibi bırak' || txt === 'Unfollow') { confirmBtn = btns[j]; break; }
          }
        }
        if (confirmBtn) { confirmBtn.click(); await sleep(400); }
        done++;
        state.selected = state.selected.filter(function(s) { return s !== un; });
        state.users = state.users.filter(function(s) { return s.username !== un; });
        state.lastOps.push({ username: un, avatar: u.avatar || '', success: true });
        render();

        // Blokaj koruması: her 10 işlemde 60sn mola
        if (state.enableBlockGuard && done % 10 === 0 && done < total) {
          await waitWithCountdown(60, done, total, un, true);
        } else {
          // Normal bekleme - geri sayımlı
          var wait = Math.floor(Math.random() * (state.maxWait - state.minWait + 1)) + state.minWait;
          await waitWithCountdown(wait, done, total, un, false);
        }
      }
    }
    hideAction();
    state.isRunning = false;
    render();
    showModal(done + ' kişi takipten çıkarıldı!');
    }); // confirmModal
  }

  })();

  render();
})();
