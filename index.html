<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Unfollowers</title>
    <style>
        body { background-color: #0d0d0d; color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; text-align: center; }
        .container { width: 90%; max-width: 600px; padding: 20px; }
        h1 { font-style: italic; font-size: 2.5rem; margin-bottom: 30px; letter-spacing: -1px; }
        .code-box { background: #1a1a1a; border-radius: 15px; padding: 20px; font-family: monospace; font-size: 12px; color: #00f2ea; overflow-x: auto; white-space: pre-wrap; border: 1px solid #333; margin-bottom: 20px; text-align: left; max-height: 300px; }
        .btn { background: #1a1a1a; color: white; border: 1px solid #333; padding: 15px 35px; border-radius: 50px; font-size: 1.1rem; cursor: pointer; transition: 0.3s; text-decoration: none; display: inline-flex; align-items: center; gap: 10px; margin: 10px 0; }
        .btn:hover { background: #00f2ea; color: black; border-color: #00f2ea; }
        hr { border: 0; border-top: 1px solid #333; margin: 40px 0; width: 100%; }
        h3 { margin-top: 0; color: #eee; }
        p { color: #888; font-size: 0.9rem; line-height: 1.5; }
    </style>
</head>
<body>
    <div class="container">
        <h1>TikTok<br>Unfollowers</h1>
        
        <div class="code-box" id="codeArea"></div>

        <button class="btn" onclick="copyCode()">📋 Copy code</button>

        <hr>

        <h3>Or use a Bookmarklet</h3>
        <p>Aşağıdaki butonu yer imleri çubuğuna sürükle. Ardından TikTok'ta bu yer imine tıklayarak çalıştır.</p>
        
        <a href="javascript:(function(){/* TikTok Unfollower Bookmarklet */})();" class="btn">🔖 Bookmarklet</a>
    </div>

    <script>
        // Senin paylaştığın JavaScript kodunun tamamı buraya gelecek
        const myScript = `(async function () {
  'use strict';
  const STORAGE_KEY = 'tu_master_v33';
  const getWL = () => { try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); } catch { return []; } };
  const saveWL = (list) => localStorage.setItem(STORAGE_KEY, JSON.stringify(list));
  const QR_DATA = "data:image/png;base64,${"iVBORw0KGgoAAAANSUhEUgAA..." /* Buraya paylaştığın o uzun base64 verisi gelecek */}";
  
  // ... Kodunun geri kalan kısmı burada varsayılıyor ...
  console.log('TikTok Unfollower Script Loaded');
})();`;

        // Sayfa yüklendiğinde kodu kutuya yazdır
        document.getElementById('codeArea').innerText = myScript;

        function copyCode() {
            const code = document.getElementById('codeArea').innerText;
            navigator.clipboard.writeText(code).then(() => {
                alert("Kod başarıyla kopyalandı! Şimdi TikTok sayfasında sağ tık > incele > konsol kısmına yapıştırabilirsin.");
            });
        }
    </script>
</body>
</html>
